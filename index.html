<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>KKL - Ruffle Web Player</title>
    <!-- 2. Load Ruffle from CDN -->
    <script src='https://unpkg.com/@ruffle-rs/ruffle'></script>
    <style>
        body { background-color: #f0f0f0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        /* 3. Container dimensions matching SWF native resolution */
        #ruffle-player { width: 800px; height: 600px; box-shadow: 0 0 10px rgba(0,0,0,0.5); background-color: #000; }
    </style>
</head>
<body>
    <div id='ruffle-player'></div>

    <script>
        // 4. Initialize Ruffle player on window load
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("load", (event) => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("ruffle-player");
            container.appendChild(player);

            // 5. Configure and load the SWF file
            player.load({
                url: "k_kisekae2.swf",
                allowScriptAccess: true,
                base: ".",
                autoplay: "on",
                unmuteOverlay: "hidden"
            });
            
            player.style.width = "800px";
            player.style.height = "600px";
        });
    </script>
</body>
</html>
